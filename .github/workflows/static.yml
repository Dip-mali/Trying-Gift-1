<!DOCTYPE html>
<html>
<head>
    <title>Lily Bouquet Letter</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Georgia, serif;

            background-image:url("https://media.istockphoto.com/id/1407748664/photo/sunflowers-blooming-in-missouri-field-in-july.jpg?s=612x612&w=0&k=20&c=xYoZNRmTXtLz1HzuGD56wSpwD7DfHlifxtlkvk3rS_U=");
            background-size:cover;
            background-position:center;
            background-repeat:no-repeat;

            display:flex;
            justify-content:center;
            align-items:center;
            min-height:150vh;
        }


        .letter{
            width:80%;
            max-width:900px;
            height:600px;
            background:rgba(255,255,255,0.9);
            border-radius:20px;
            padding:30px; 
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        {margin:0;
        font-family:Arial, sans-serif;
        display:flex;
        justify-content:left;
        align-items:center;
        height:100vh;
        background:transparent;
    }

        .gift{
        font-size:30px;
        align-items: flex-start;
        animation:bounce 1.5s infinite;
       }

        .sticker{
        display:inline-block;
        background:#ff4081;
        color:lightblue;
        padding:10px 20px;
        border-radius:100px;
        font-weight:500px;
        margin:5px 0;
        transform:rotate(-7deg);
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
       }
       @keyframes bounce{
        0%,100%{transform:translateY(0);}
        50%{transform:translateY(-15px);}  
       }

        textarea{
            width:100%;
            height:350px;
            border:none;
            outline:none;
            resize:none;
            background:transparent;
            font-size:15px;
            line-height:1.8;
            color: #000;
        }

    </style>
</head>
<body>


<div class="letter">
    <h1 style="text-align:center;color: #0047AB;">
        🌻-: Whishes From :-🌻
    </h1>

    <textarea placeholder="আপনাকে জন্মদিনের অনেক অনেক শুভেচ্ছা, অনেক ভালো কাটুক আপনার দিন 🙌🏻 আসা করব আপনি আপনার ভবিষ্যতে অনেক উঁচু পর্যায়ে যান আপনি আপনার সকল ইচ্ছে সকল স্বপ্ন পূরনের শিখরে পৌঁছোন এটাই কামনা করি 😌, অনেক ভালো থাকুন অনেক আনন্দে থাকুন, আমার জীবনে আপনার একটা অবদান রয়ে গেছে যেটা আমি হয়তো কখনও শোধ করতে পারব না তার ধন্যবাদ আপনাকে আমাক অনেক কিছু শেখানোর জন্য অনেক জ্ঞান প্রদান করব জন্য , তবে এটাই আসা করব আপনি অনেক ভালো জায়গায় যান, 🙏🏻
আর বেশি কথা বলে আপনার অমূল্য সময়টা নষ্ট করব না, 
তবে শেষে একটাই কথা বলব - রাগ সবার থাকে আর মুখ ভগবান সবাইকে দিয়েছেন আর আপনিও শিক্ষিত অনেক আপনাদের শিক্ষিত মান্যগণ্য পরিবার কিন্তু এমনভাবে শিক্ষা টার অপব্যবহার করবেন না আর নিজের জন্য পরিবারের ও সম্মান টা নষ্ট করবেন না যেটা ওনারা অনেক কষ্ট করে অর্জন করেছেন, তাহলে হয়তো আপনার শিক্ষাটার আর কোনো মূল্য থাকবে না, আর ভগবান মুখ দিয়েছেন বলে এই নয় যে এমন কিছু কথা বলবেন না যাতে মরা মানুষও জীবিত হয়ে এসে আপনাকে প্রহার করতে বাধ্য হয়, মুখটা যেখানে খোলার সেখানে পর্যাপ্ত পরিমাণে খুলুন তাতে কোনো ক্ষতি নেই কিন্তু ভাষা টা আপনার শিক্ষার প্রমাণ দেয় তাই রাগ সবারই হয় আর রাগ ও সবাই দেখায় কিন্তু ভাষার প্রয়োগ করার সময় সেটা নিজেকে সংযত রেখে তবেই করতে হয়।
কারণ কী কত বইয়ের পাতা থেকে আর কত বড় ক্লাস থেকে শিক্ষা সেটা থেকেও কে কিভাবে নিজেকে চালিত করে সেটাই বেশি লক্ষ্য করা হয় মানুষের জ্ঞান পরোক্ষ করার জন্য তো আসা করি আপনিও হয়তো এইগুলো দেখে রাগ না দেখিয়ে পর্যাপ্ত ভাবে নেবেন কথাগুলো, আর সম্পর্কের মধ্যে ভুল দুজনেই করে কিন্তু কে নিজের ভুলটা স্বীকার করে সেটাই বেশি গুরুত্বপূর্ণ ।
                                                       
                                                            ইতি - আপনার অপছন্দের দীপ বুদ্ধু "></textarea>
    <div class="sticker">
        Happy Birthday!
    </div>
<div class="gift">🎉SORRY🎂FOR🎁LATE🎂WISHING🎉</div>
    <h2>🍓🍰🍧-Have An Amazing Birthday To You-🍧🍰🍓
    Wishing you happiness, success, and lots of wonderful gifts on your special day!</h2>
</div>
</div>
</body>
</html>
